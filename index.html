<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro Comercial Ponta de Humaitá</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;font-family:'Segoe UI', sans-serif;}
.topo{
background:linear-gradient(135deg,#ff5722,#ff9800);
color:white;
padding:30px 20px 70px 20px;
text-align:center;
position:relative;
}
.logo-central{
width:120px;
border-radius:50%;
display:block;
margin:0 auto 15px auto;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
.botoes-topo{position:absolute;top:15px;right:15px;}
.btn-admin{background:#222;color:white;}
.btn-inicio-central{
position:absolute;
bottom:-25px;
left:50%;
transform:translateX(-50%);
background:white;
color:#ff5722;
font-weight:bold;
border-radius:30px;
padding:8px 25px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.card-servico{
border:none;
border-radius:20px;
transition:0.3s;
cursor:pointer;
}
.card-servico:hover{transform:translateY(-5px);}
.card-servico img{
height:180px;
object-fit:cover;
border-top-left-radius:20px;
border-top-right-radius:20px;
}
.btn-whatsapp{background:#25d366;color:white;border:none;}
#painelAdmin{
display:none;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}
.carousel-item img{
height:300px;
object-fit:cover;
}
</style>
</head>
<body>

<div class="topo">
<img src="logo.png" class="logo-central">
<h2>CENTRO COMERCIAL PONTA DE HUMAITÁ</h2>
<p>Os melhores profissionais da sua região</p>

<div class="botoes-topo">
<button class="btn btn-admin shadow" onclick="loginAdmin()">🔒 Admin</button>
</div>

<button class="btn btn-inicio-central shadow" onclick="inicio()">🗼 Início</button>
</div>

<div class="container mt-5">

<input type="text" id="buscar" class="form-control mb-4" placeholder="Buscar serviço..." onkeyup="renderizar()">

<div id="painelAdmin">
<h5>Painel Administrativo</h5>

<input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
<input type="text" id="categoria" class="form-control mb-2" placeholder="Categoria">
<textarea id="descricao" class="form-control mb-2" placeholder="Descrição"></textarea>
<input type="text" id="telefone" class="form-control mb-2" placeholder="WhatsApp">

<label><strong>Foto de Capa</strong></label>
<input type="file" id="capa" class="form-control mb-2">

<label><strong>Adicionar Fotos</strong></label>
<input type="file" id="fotos" class="form-control mb-2" multiple>

<button class="btn btn-success w-100 mb-2" onclick="salvarServico()">Salvar Serviço</button>

<button class="btn btn-dark w-100 mb-3" onclick="gerarCodigoFinal()">
Gerar Código Atualizado para GitHub
</button>

<textarea id="codigoFinal" class="form-control" rows="12"></textarea>
</div>

<div class="row" id="lista"></div>
</div>

<script>

const HASH_CORRETO = "91ddcdc211e6bff86d164f9347c5f132107d010d29509f8149eedad5cefe01a3";

function gerarHash(texto){
const encoder = new TextEncoder();
const data = encoder.encode(texto);
return crypto.subtle.digest("SHA-256", data).then(hashBuffer => {
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
});
}

function loginAdmin(){
let senha = prompt("Digite a senha do admin:");
if(!senha) return;
gerarHash(senha).then(hashDigitado => {
if(hashDigitado === HASH_CORRETO){
document.getElementById("painelAdmin").style.display="block";
}else{
alert("Senha incorreta!");
}
});
}

let BASE_SERVICOS = [];
let servicos = [...BASE_SERVICOS];

function salvarServico(){

let nome=document.getElementById("nome").value;
let categoria=document.getElementById("categoria").value;
let descricao=document.getElementById("descricao").value;
let telefone=document.getElementById("telefone").value;
let capaFile=document.getElementById("capa").files[0];
let fotosFiles=document.getElementById("fotos").files;

if(!nome||!categoria||!telefone){
alert("Preencha os campos obrigatórios");
return;
}

let capaNome=capaFile? "imagens/"+capaFile.name : "";

let fotosArray=[];
for(let i=0;i<fotosFiles.length;i++){
fotosArray.push("imagens/"+fotosFiles[i].name);
}

let novo={
nome,
categoria,
descricao,
telefone,
capa:capaNome,
fotos:fotosArray
};

servicos.push(novo);

renderizar();
limpar();
}

function gerarCodigoFinal(){
let codigo="let BASE_SERVICOS = "+JSON.stringify(servicos,null,4)+";";
document.getElementById("codigoFinal").value=codigo;
}

function limpar(){
document.getElementById("nome").value="";
document.getElementById("categoria").value="";
document.getElementById("descricao").value="";
document.getElementById("telefone").value="";
document.getElementById("capa").value="";
document.getElementById("fotos").value="";
}

function renderizar(){
let lista=document.getElementById("lista");
lista.innerHTML="";

servicos.forEach((s,index)=>{
let fotoPrincipal=s.capa||(s.fotos.length>0?s.fotos[0]:'https://via.placeholder.com/400x200');

lista.innerHTML+=`
<div class="col-lg-4 col-md-6 col-12 mb-4">
<div class="card card-servico shadow" onclick="abrirDetalhe(${index})">
<img src="${fotoPrincipal}">
<div class="card-body">
<h5>${s.nome}</h5>
<strong>${s.categoria}</strong>
</div>
</div>
</div>`;
});
}

function abrirDetalhe(index){
let s=servicos[index];
let todasFotos=[];
if(s.capa) todasFotos.push(s.capa);
if(s.fotos.length>0) todasFotos=todasFotos.concat(s.fotos);

let fotosHTML="";
todasFotos.forEach((f,i)=>{
fotosHTML+=`
<div class="carousel-item ${i===0?'active':''}">
<img src="${f}" class="d-block w-100">
</div>`;
});

document.body.insertAdjacentHTML("beforeend",`
<div class="modal fade show" style="display:block;background:rgba(0,0,0,0.6)">
<div class="modal-dialog modal-lg">
<div class="modal-content p-3">
<div id="carouselExample" class="carousel slide mb-3">
<div class="carousel-inner">${fotosHTML}</div>
</div>
<h4>${s.nome}</h4>
<strong>${s.categoria}</strong>
<p>${s.descricao}</p>
<a href="https://wa.me/55${s.telefone}" target="_blank" class="btn btn-whatsapp w-100 mt-2">Falar no WhatsApp</a>
<button class="btn btn-secondary w-100 mt-2" onclick="location.reload()">Fechar</button>
</div>
</div>
</div>`);
}

renderizar();

</script>

</body>
</html>
